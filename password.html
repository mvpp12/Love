<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#d4597a">
    <meta name="description" content="Password protection for Our Memories photo album">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='65' font-size='80' text-anchor='middle'>❤️</text></svg>">
    <title>Unlock - Our Memories</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffeef8 0%, #fff0f6 100%);
        }

        .password-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #c44569;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #666;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #f0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #d4597a;
            box-shadow: 0 0 10px rgba(212, 89, 122, 0.2);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .unlock-btn {
            background: linear-gradient(135deg, #d4597a 0%, #c44569 100%);
            color: white;
        }

        .unlock-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 89, 122, 0.3);
        }

        .unlock-btn:active {
            transform: translateY(0);
        }

        .back-btn {
            background: #f5f5f5;
            color: #666;
            border: 1px solid #e0e0e0;
        }

        .back-btn:hover {
            background: #eee;
        }

        .error-message {
            color: #e74c3c;
            text-align: center;
            font-size: 14px;
            margin-top: 15px;
            display: none;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .show-password {
            display: flex;
            align-items: center;
            margin-top: 10px;
            gap: 8px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }

        .show-password input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .heart {
            display: inline-block;
            animation: heartbeat 0.8s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1); }
        }

        @media (max-width: 600px) {
            .password-container {
                margin: 20px;
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="password-container">
        <h1>Unlock <span class="heart">❤️</span></h1>
        <p class="subtitle">Enter the password to view our memories</p>

        <form onsubmit="checkPassword(event)">
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Enter password" 
                    required
                    autofocus
                >
                <div class="show-password">
                    <input type="checkbox" id="showPassword" onchange="togglePasswordVisibility()">
                    <label for="showPassword" style="margin: 0; cursor: pointer;">Show password</label>
                </div>
            </div>

            <div class="button-group">
                <button type="button" class="back-btn" onclick="goBack()">← Back</button>
                <button type="submit" class="unlock-btn">Unlock</button>
            </div>

            <div class="error-message" id="errorMessage">
                ❌ Incorrect password. Please try again.
            </div>
        </form>
    </div>

    <script>
        // Register service worker for PWA support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => {
                console.log('Service Worker registration failed:', err);
            });
        }

        const CORRECT_PASSWORD = '100324';

        function checkPassword(event) {
            event.preventDefault();
            const passwordInput = document.getElementById('password');
            const errorMessage = document.getElementById('errorMessage');

            if (passwordInput.value === CORRECT_PASSWORD) {
                // Store session flag to prevent direct URL access
                sessionStorage.setItem('albumAccessGranted', 'true');
                window.location.href = 'album.html';
            } else {
                errorMessage.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 3000);
            }
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const checkbox = document.getElementById('showPassword');
            passwordInput.type = checkbox.checked ? 'text' : 'password';
        }

        // Try pressing Enter
        document.getElementById('password').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                checkPassword(event);
            }
        });
    </script>
</body>
</html>
